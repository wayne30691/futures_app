name: Build And Deploy MTX Viewer

on:
  workflow_dispatch:
  schedule:
    # 16:50 Asia/Taipei = 08:50 UTC
    - cron: "50 8 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare raw directory
        run: mkdir -p raw

      - name: Fetch recent 30-day CSV files
        run: python scripts/fetch_all_taifex_fut_csv_30d.py

      - name: Build static site
        run: python scripts/publish_raw_web.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
